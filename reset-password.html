<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposta Nuova Password - PCTO Harzafi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <meta name="robots" content="noimageindex">
    
    <!-- LIBRERIE FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #0284c7; --primary-hover: #0369a1; --bg-body: #f8fafc;
            --text-dark: #0f172a; --text-gray: #475569; --border-color: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .modal-content { background: #ffffff; padding: 40px; border-radius: 28px; width: 100%; max-width: 460px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); text-align: center; }
        .logo { display: block; width: auto; height: 50px; margin: 0 auto 20px; background: transparent; border: none; }
        h2 { font-size: 1.8rem; font-weight: 900; color: var(--text-dark); margin-bottom: 10px; }
        p { color: var(--text-gray); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        
        .input-group { text-align: left; margin-bottom: 22px; }
        label { font-weight: 800; color: #374151; font-size: 0.95rem; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 16px 18px; border: 2px solid #e5e7eb; border-radius: 14px; font-size: 1.05rem; outline: none; transition: border-color 0.3s; background: #f9fafb; }
        input:focus { border-color: var(--primary); background: #fff; }
        
        .btn-submit { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(2, 132, 199, 0.3); }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .error-msg { color: #ef4444; font-size: 0.9rem; margin-top: 8px; display: none; font-weight: 700; text-align: center; }
        .success-msg { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; padding: 15px; border-radius: 12px; font-weight: 800; display: none; margin-bottom: 20px; }
        
        #reset-form { display: none; }
        #loading-msg { font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <div class="modal-content">
        <img src="IMMAGINI/LOGO-HARZAFI.png" alt="Logo" class="logo">
        <h2>Imposta Nuova Password</h2>
        <p id="sub-text">Verifica del link in corso...</p>
        
        <div id="loading-msg">Attendere prego...</div>

        <div class="success-msg" id="success-msg">
            ✅ Password aggiornata con successo!<br><br>
            <a href="index.html" style="color:#065f46; text-decoration:underline;">Torna al Login</a>
        </div>

        <div class="error-msg" id="error-msg" style="margin-bottom: 20px;"></div>

        <form id="reset-form">
            <div class="input-group">
                <label>Nuova Password:</label>
                <input type="password" id="new-password" placeholder="Inserisci almeno 6 caratteri" required minlength="6">
            </div>
            <div class="input-group">
                <label>Conferma Nuova Password:</label>
                <input type="password" id="confirm-password" placeholder="Ripeti la password" required minlength="6">
                <div class="error-msg" id="match-error">Le password non coincidono.</div>
            </div>
            <button type="submit" id="btn-save" class="btn-submit">SALVA PASSWORD</button>
        </form>
    </div>

    <script>
        // STESSA CONFIGURAZIONE FIREBASE DEL TUO SITO
        const firebaseConfig = {
            apiKey: "AIzaSyBisp324W7J5jGwF_s-nbXabOjEutcwMmc",
            authDomain: "harzafi---fsl.firebaseapp.com",
            projectId: "harzafi---fsl"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ELEMENTI DOM
        const loadingMsg = document.getElementById('loading-msg');
        const resetForm = document.getElementById('reset-form');
        const successMsg = document.getElementById('success-msg');
        const errorMsg = document.getElementById('error-msg');
        const subText = document.getElementById('sub-text');
        const matchError = document.getElementById('match-error');

        // PRENDI IL CODICE DALL'URL
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');
        const mode = urlParams.get('mode'); // Deve essere 'resetPassword'

        if (!actionCode || mode !== 'resetPassword') {
            loadingMsg.style.display = 'none';
            errorMsg.innerText = "Link non valido, scaduto o corrotto. Richiedi un nuovo reset dalla pagina di login.";
            errorMsg.style.display = 'block';
            subText.style.display = 'none';
        } else {
            // VERIFICA CHE IL CODICE SIA VALIDO CON FIREBASE
            auth.verifyPasswordResetCode(actionCode).then((email) => {
                loadingMsg.style.display = 'none';
                resetForm.style.display = 'block';
                subText.innerHTML = `Imposta una nuova password per l'account:<br><b>${email}</b>`;
            }).catch((error) => {
                loadingMsg.style.display = 'none';
                errorMsg.innerText = "Il link è scaduto o è già stato utilizzato.";
                errorMsg.style.display = 'block';
                subText.style.display = 'none';
            });
        }

        // SALVATAGGIO NUOVA PASSWORD
        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pass1 = document.getElementById('new-password').value;
            const pass2 = document.getElementById('confirm-password').value;
            const btnSave = document.getElementById('btn-save');

            if (pass1 !== pass2) {
                matchError.style.display = 'block';
                return;
            }
            matchError.style.display = 'none';
            btnSave.disabled = true;
            btnSave.innerText = "SALVATAGGIO...";

            auth.confirmPasswordReset(actionCode, pass1).then(() => {
                resetForm.style.display = 'none';
                successMsg.style.display = 'block';
                subText.style.display = 'none';
            }).catch((error) => {
                errorMsg.innerText = "Errore durante il salvataggio: " + error.message;
                errorMsg.style.display = 'block';
                btnSave.disabled = false;
                btnSave.innerText = "SALVA PASSWORD";
            });
        });
    </script>
</body>
</html>
